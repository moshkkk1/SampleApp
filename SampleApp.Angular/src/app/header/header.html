<mat-toolbar color="primary">
   @if(authService.currentUser() != null){

    <button mat-button type="button" [routerLink] = "['/auth']">
        <mat-icon>
          logout
        </mat-icon>
        Выход
    </button>

    <button mat-button [routerLink] = "['/users']">
      <mat-icon>
          people
      </mat-icon>
      Пользователи
    </button>
  }
  @else
  {
      <button mat-button [routerLink] = "['/auth']" >
    <mat-icon>
      sign
    </mat-icon>
    Авторизация
  </button>
  }
  <button mat-button [routerLink] = "['/home']" >
    <mat-icon>
      home
    </mat-icon>
    Home
  </button>

</mat-toolbar>
